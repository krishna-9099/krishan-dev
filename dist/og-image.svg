<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.05">
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="white" stroke-width="1"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#grid)"/>
  </g>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="150" fill="#22c55e" opacity="0.05"/>
  <circle cx="1100" cy="530" r="200" fill="#22c55e" opacity="0.03"/>
  
  <!-- Accent line -->
  <rect x="100" y="200" width="8" height="80" rx="4" fill="url(#accentGradient)"/>
  
  <!-- Name -->
  <text x="130" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="white">
    Krishan
  </text>
  
  <!-- Title -->
  <text x="100" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#a3a3a3">
    Flutter Developer & Audio Architect
  </text>
  
  <!-- Tagline -->
  <text x="100" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#737373">
    High-Performance Mobile Applications • Audio Systems • Cross-Platform Solutions
  </text>
  
  <!-- Stats -->
  <g transform="translate(100, 480)">
    <text font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#22c55e" font-weight="600">
      5+ Years
    </text>
    <text x="120" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#737373">
      Experience
    </text>
    
    <text x="280" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#22c55e" font-weight="600">
      20+ Apps
    </text>
    <text x="400" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#737373">
      Published
    </text>
    
    <text x="540" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#22c55e" font-weight="600">
      1M+ Downloads
    </text>
  </g>
  
  <!-- Website URL -->
  <text x="100" y="570" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#525252">
    krishan.dev
  </text>
</svg>
